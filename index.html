<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nutrition Aliments</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>🥗 Nutrition — Table des Aliments</h1>
    </header>

    <div class="toolbar no-print">
      <div class="search-box">
        <input
          type="text"
          id="searchInput"
          placeholder="Rechercher un aliment…"
        />
      </div>

      <div class="column-selector-wrapper">
        <button class="btn" id="columnToggleBtn">☰ Colonnes</button>
        <div class="column-dropdown" id="columnDropdown"></div>
      </div>

      <button class="btn" id="printBtn">🖨️ Imprimer</button>
    </div>

    <p class="row-count" id="rowCount"></p>

    <div class="table-container" id="tableContainer"></div>

    <script defer src="script.js"></script>
  </body>
</html>
